<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="mask-icon" href="/favicon.svg" color="#22c55e" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroWatch - Intelligent Farming Companion</title>
</head>

<body>
  <div id="root">
    <!-- Initial Loading Splash -->
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9fbf9;">
      <div style="width: 64px; height: 64px; border-radius: 12px; background: #22c55e; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0f1712" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C10.7 14.4 12.5 12 14 10l7 10"/>
        </svg>
      </div>
      <style>
        @keyframes pulse {
          0% { opacity: 0.4; transform: scale(0.95); }
          50% { opacity: 1; transform: scale(1.05); }
          100% { opacity: 0.4; transform: scale(0.95); }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
